<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>よみとき — AIの返答を、測り直す。</title>
<meta name="description" content="AIの返答を8つの軸で検品し、測り直した文に組み直すツール。TAKIBI lab">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF9F5;
    --line:rgba(31,33,35,.06);
    --ink:#1F2123;
    --ink-soft:#5A5D60;
    --ink-faint:#9B9EA1;
    --rule:#E3E1DB;
    --card:#FFFFFF;
    --shu:#C2452F;        /* 朱：根拠なき断定 */
    --yamabuki:#A86F1E;   /* 山吹：過剰肯定 */
    --fuji:#6F5FA8;       /* 藤：過剰な未来予測 */
    --asagi:#2A7A8C;      /* 浅葱：出典なき権威 */
    --display:"Shippori Mincho B1","Hiragino Mincho ProN","Yu Mincho",serif;
    --body:"Zen Kaku Gothic New","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--body);
    color:var(--ink);
    background-color:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:28px 28px;
    line-height:1.85;
    font-size:15px;
  }
  .wrap{max-width:720px;margin:0 auto;padding:40px 20px 96px}

  /* ── 標題 ── */
  header{margin-bottom:36px}
  .lab{font-size:11px;letter-spacing:.22em;color:var(--ink-faint);margin-bottom:10px}
  h1{
    font-family:var(--display);
    font-weight:700;
    font-size:44px;
    letter-spacing:.06em;
    line-height:1.2;
  }
  .tagline{
    font-family:var(--display);
    font-size:15px;
    color:var(--ink-soft);
    margin-top:8px;
    letter-spacing:.08em;
  }
  .rule{border:none;border-top:1px solid var(--rule);margin:28px 0}

  /* ── 設定 ── */
  details.config{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:4px;
    margin-bottom:24px;
  }
  details.config summary{
    cursor:pointer;
    padding:12px 16px;
    font-size:13px;
    font-weight:500;
    color:var(--ink-soft);
    list-style:none;
    display:flex;justify-content:space-between;align-items:center;
  }
  details.config summary::-webkit-details-marker{display:none}
  details.config summary::after{content:"＋";color:var(--ink-faint);font-size:14px}
  details.config[open] summary::after{content:"－"}
  .config-body{padding:4px 16px 18px;display:grid;gap:14px}
  .field label{display:block;font-size:12px;color:var(--ink-soft);margin-bottom:6px;letter-spacing:.04em}
  .field input{
    width:100%;
    padding:10px 12px;
    border:1px solid var(--rule);
    border-radius:4px;
    font-size:14px;
    font-family:var(--body);
    background:#FCFCFA;
    color:var(--ink);
  }
  .field input:focus{outline:2px solid var(--ink);outline-offset:-1px}
  .config-note{font-size:12px;color:var(--ink-faint);line-height:1.7}
  .config-note a{color:var(--asagi)}

  /* ── 入力 ── */
  .input-block{margin-bottom:18px}
  .input-block label{
    display:flex;align-items:baseline;gap:8px;
    font-size:13px;font-weight:700;margin-bottom:8px;letter-spacing:.04em;
  }
  .input-block label .opt{font-size:11px;font-weight:400;color:var(--ink-faint)}
  textarea{
    width:100%;
    min-height:96px;
    padding:14px;
    border:1px solid var(--rule);
    border-radius:4px;
    font-family:var(--body);
    font-size:14px;
    line-height:1.8;
    background:var(--card);
    color:var(--ink);
    resize:vertical;
  }
  textarea#reply{min-height:180px}
  textarea:focus{outline:2px solid var(--ink);outline-offset:-1px}

  /* ── 実行 ── */
  .run-row{display:flex;align-items:center;gap:16px;margin:24px 0 8px}
  button.run{
    font-family:var(--display);
    font-size:16px;
    font-weight:700;
    letter-spacing:.18em;
    padding:13px 36px;
    background:var(--ink);
    color:var(--paper);
    border:none;
    border-radius:4px;
    cursor:pointer;
  }
  button.run:hover{background:#000}
  button.run:disabled{background:var(--ink-faint);cursor:wait}
  button.run:focus-visible{outline:2px solid var(--shu);outline-offset:2px}
  .status{font-size:13px;color:var(--ink-soft)}
  .status.error{color:var(--shu)}

  /* ── 凡例 ── */
  .legend{
    display:flex;flex-wrap:wrap;gap:8px 16px;
    margin:28px 0 16px;
    font-size:12px;color:var(--ink-soft);
  }
  .legend .key{display:flex;align-items:center;gap:6px}
  .key .swatch{width:18px;height:0;border-bottom:3px solid;display:inline-block}
  .key.k-dantei .swatch{border-color:var(--shu)}
  .key.k-koutei .swatch{border-color:var(--yamabuki)}
  .key.k-mirai  .swatch{border-color:var(--fuji)}
  .key.k-keni   .swatch{border-color:var(--asagi)}
  .legend .key-base{color:var(--ink-faint)}

  /* ── 結果 ── */
  .result{display:none}
  .result.show{display:block}
  section.panel{
    background:var(--card);
    border:1px solid var(--rule);
    border-radius:4px;
    padding:24px 22px;
    margin-bottom:24px;
    position:relative;
  }
  .panel-title{
    font-family:var(--display);
    font-size:15px;
    font-weight:700;
    letter-spacing:.14em;
    margin-bottom:16px;
    color:var(--ink);
  }
  .marked{font-size:15px;line-height:2.15;word-break:break-word;white-space:pre-wrap}
  .seg{border-bottom:3px solid transparent;padding-bottom:1px;cursor:default}
  .seg.flagged{cursor:pointer}
  .seg .badge{
    font-size:10px;
    color:var(--ink-faint);
    vertical-align:super;
    margin-right:1px;
    user-select:none;
  }
  .seg.f-dantei{border-bottom-color:var(--shu)}
  .seg.f-koutei{border-bottom-color:var(--yamabuki)}
  .seg.f-mirai{border-bottom-color:var(--fuji)}
  .seg.f-keni{border-bottom-color:var(--asagi)}

  /* 所見 */
  .findings{margin-top:20px;border-top:1px dashed var(--rule);padding-top:16px;display:grid;gap:12px}
  .finding{font-size:13px;line-height:1.8}
  .finding .f-tag{
    display:inline-block;
    font-size:11px;
    font-weight:700;
    padding:1px 8px;
    border-radius:2px;
    margin-right:8px;
    color:#fff;
    letter-spacing:.06em;
  }
  .f-tag.t-dantei{background:var(--shu)}
  .f-tag.t-koutei{background:var(--yamabuki)}
  .f-tag.t-mirai{background:var(--fuji)}
  .f-tag.t-keni{background:var(--asagi)}
  .finding .f-quote{color:var(--ink-soft)}
  .finding .f-note{display:block;color:var(--ink);margin-top:2px}
  .none-note{font-size:13px;color:var(--ink-faint)}

  /* 測り直した返答：朱印 */
  .panel.remeasured::after{
    content:"読";
    position:absolute;
    top:14px;right:16px;
    width:40px;height:40px;
    border:2.5px solid var(--shu);
    border-radius:50%;
    color:var(--shu);
    font-family:var(--display);
    font-size:19px;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
    transform:rotate(-7deg);
    opacity:.85;
    pointer-events:none;
  }
  .remeasured-text{font-size:15px;line-height:2.05;white-space:pre-wrap;word-break:break-word}
  .copy-row{margin-top:18px;display:flex;align-items:center;gap:12px}
  button.copy{
    font-family:var(--body);
    font-size:12.5px;
    font-weight:500;
    padding:8px 18px;
    background:transparent;
    border:1px solid var(--ink);
    border-radius:4px;
    color:var(--ink);
    cursor:pointer;
    letter-spacing:.06em;
  }
  button.copy:hover{background:var(--ink);color:var(--paper)}
  .copied{font-size:12px;color:var(--asagi)}

  .summary{
    font-family:var(--display);
    font-size:14px;
    color:var(--ink-soft);
    border-left:3px solid var(--ink);
    padding:2px 0 2px 14px;
    margin-bottom:24px;
    letter-spacing:.03em;
  }

  footer{
    margin-top:56px;
    font-size:11.5px;
    color:var(--ink-faint);
    line-height:1.9;
    letter-spacing:.04em;
  }

  @media (max-width:480px){
    h1{font-size:36px}
    .wrap{padding:28px 16px 72px}
    section.panel{padding:20px 16px}
  }
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <p class="lab">TAKIBI lab</p>
    <h1>よみとき</h1>
    <p class="tagline">AIの返答を、測り直す。</p>
  </header>

  <details class="config" id="config">
    <summary>APIキーとモデルの設定</summary>
    <div class="config-body">
      <div class="field">
        <label for="apikey">Gemini APIキー</label>
        <input type="password" id="apikey" placeholder="AIza..." autocomplete="off">
      </div>
      <div class="field">
        <label for="model">モデル名</label>
        <input type="text" id="model" list="model-list" placeholder="gemini-2.5-flash">
        <datalist id="model-list">
          <option value="gemini-2.5-flash"></option>
          <option value="gemini-2.5-pro"></option>
          <option value="gemini-2.0-flash"></option>
        </datalist>
      </div>
      <p class="config-note">キーはこの端末のブラウザにのみ保存され、外部には送信されません（Google のAPIを除く）。キーは <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">Google AI Studio</a> で無料発行できます。</p>
    </div>
  </details>

  <div class="input-block">
    <label for="question">元の質問・文脈 <span class="opt">任意</span></label>
    <textarea id="question" placeholder="AIに投げた質問や、会話の文脈があれば貼る。"></textarea>
  </div>

  <div class="input-block">
    <label for="reply">AIの返答</label>
    <textarea id="reply" placeholder="検品したいAIの返答を、ここに貼る。"></textarea>
  </div>

  <div class="run-row">
    <button class="run" id="run">測り直す</button>
    <span class="status" id="status"></span>
  </div>

  <div class="result" id="result">

    <hr class="rule">

    <p class="summary" id="summary"></p>

    <div class="legend" aria-hidden="true">
      <span class="key k-dantei"><span class="swatch"></span>根拠なき断定</span>
      <span class="key k-koutei"><span class="swatch"></span>過剰肯定</span>
      <span class="key k-mirai"><span class="swatch"></span>過剰な未来予測</span>
      <span class="key k-keni"><span class="swatch"></span>出典なき権威</span>
      <span class="key key-base">肩の小字＝事実・推論・意見・励ましの区分</span>
    </div>

    <section class="panel">
      <h2 class="panel-title">検 品</h2>
      <div class="marked" id="marked"></div>
      <div class="findings" id="findings"></div>
    </section>

    <section class="panel remeasured">
      <h2 class="panel-title">測り直した返答</h2>
      <div class="remeasured-text" id="remeasured"></div>
      <div class="copy-row">
        <button class="copy" id="copy">この文を写す</button>
        <span class="copied" id="copied"></span>
      </div>
    </section>

  </div>

  <footer>
    よみとき — AIの返答を8つの軸（事実・推論・意見・励まし・根拠なき断定・過剰肯定・過剰な未来予測・出典なき権威）で検品し、本来あるべき温度の文に組み直す道具。点数はつけない。<br>
    TAKIBI lab
  </footer>

</div>

<script>
(function(){
  "use strict";

  var $ = function(id){ return document.getElementById(id); };

  /* ── 保存と復元（localStorageが使えない環境でも落ちない） ── */
  function store(key, val){ try{ localStorage.setItem(key, val); }catch(e){} }
  function recall(key){ try{ return localStorage.getItem(key) || ""; }catch(e){ return ""; } }

  $("apikey").value = recall("yomitoki_key");
  $("model").value  = recall("yomitoki_model") || "gemini-2.5-flash";
  if(!$("apikey").value){ $("config").open = true; }

  $("apikey").addEventListener("change", function(){ store("yomitoki_key", this.value.trim()); });
  $("model").addEventListener("change",  function(){ store("yomitoki_model", this.value.trim()); });

  /* ── 検出軸の定義 ── */
  var FLAG_DEF = {
    "根拠なき断定":   { cls:"dantei" },
    "過剰肯定":       { cls:"koutei" },
    "過剰な未来予測": { cls:"mirai"  },
    "出典なき権威":   { cls:"keni"   }
  };
  var TYPE_BADGE = { "事実":"事", "推論":"推", "意見":"意", "励まし":"励" };

  /* ── 解析プロンプト ── */
  function buildPrompt(question, reply){
    return [
"あなたは「よみとき」という、AIの返答を校正する検品者です。点数はつけません。",
"以下の【AIの返答】を文・節ごとの区切り（セグメント）に分け、各セグメントを次の基準で評価してください。",
"",
"■ 区分（必ず一つ）",
"・事実：検証可能な事柄の記述",
"・推論：根拠から導いた推測（「〜と考えられる」等）",
"・意見：価値判断・好み・立場の表明",
"・励まし：相手を励ます・労う・寄り添う言葉",
"",
"■ 検出フラグ（該当するものすべて。なければ空配列）",
"・根拠なき断定：根拠を示さず断定形で言い切っている（推論や意見を事実の形で述べている）",
"・過剰肯定：相手や相手の考えを必要以上に持ち上げている。おべっか・追従・無条件の同意",
"・過剰な未来予測：不確実な未来を確度高く語っている",
"・出典なき権威：「専門家によれば」「研究では」等、出典を示さず権威を借りている",
"",
"■ 測り直した返答",
"元の返答の有用な中身は保ちつつ、次の校正を施した全文を書いてください。",
"・根拠なき断定 → 推論・意見であることが分かる表現に格下げする",
"・過剰肯定 → 削るか、根拠のある評価に置き換える",
"・過剰な未来予測 → 不確実性が伝わる表現にする",
"・出典なき権威 → 出典を示せないなら権威の借用をやめ、自分の推論として述べる",
"・文体と言語は元の返答に合わせる",
"",
"■ 出力形式",
"次のJSONのみを出力すること。前置き・後書き・コードフェンスは禁止。",
'{"segments":[{"text":"セグメント原文そのまま","type":"事実|推論|意見|励まし","flags":["根拠なき断定"等、なければ空配列],"note":"フラグがある場合のみ、何が問題かを一文で"}],"summary":"返答全体の所見を一〜二文で。点数や等級は使わない","remeasured":"測り直した返答の全文"}',
"",
"segmentsのtextを順に連結すると元の返答が(改行や空白の差を除き)復元できるようにすること。",
"",
(question ? "【元の質問・文脈】\n" + question + "\n\n" : ""),
"【AIの返答】\n" + reply
    ].join("\n");
  }

  /* ── Gemini API 呼び出し ── */
  function callGemini(key, model, prompt){
    var url = "https://generativelanguage.googleapis.com/v1beta/models/"
            + encodeURIComponent(model) + ":generateContent?key=" + encodeURIComponent(key);
    return fetch(url, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        contents:[{ role:"user", parts:[{ text: prompt }] }],
        generationConfig:{ temperature:0.2, responseMimeType:"application/json" }
      })
    }).then(function(res){
      if(!res.ok){
        return res.json().catch(function(){ return {}; }).then(function(body){
          var msg = (body && body.error && body.error.message) ? body.error.message : ("HTTP " + res.status);
          if(res.status === 400 && /API key/i.test(msg)) msg = "APIキーが無効です。設定を確認してください。";
          if(res.status === 403) msg = "このキーでは利用できません。キーの権限を確認してください。";
          if(res.status === 404) msg = "モデル名が見つかりません。設定のモデル名を確認してください。";
          if(res.status === 429) msg = "回数の上限に達しました。少し置いてから再実行してください。";
          throw new Error(msg);
        });
      }
      return res.json();
    }).then(function(data){
      var parts = data && data.candidates && data.candidates[0]
               && data.candidates[0].content && data.candidates[0].content.parts;
      var text = (parts || []).map(function(p){ return p.text || ""; }).join("");
      if(!text) throw new Error("モデルから本文が返りませんでした。");
      text = text.replace(/^```(?:json)?\s*/i, "").replace(/\s*```\s*$/, "").trim();
      var parsed;
      try{ parsed = JSON.parse(text); }
      catch(e){ throw new Error("結果の形式を読み取れませんでした。もう一度実行してください。"); }
      if(!parsed || !Array.isArray(parsed.segments) || typeof parsed.remeasured !== "string"){
        throw new Error("結果の形式が想定と異なります。もう一度実行してください。");
      }
      return parsed;
    });
  }

  /* ── 描画 ── */
  function esc(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  function render(result){
    var markedHtml = "";
    var findingsHtml = "";
    var flaggedCount = 0;

    result.segments.forEach(function(seg){
      var flags = Array.isArray(seg.flags) ? seg.flags.filter(function(f){ return FLAG_DEF[f]; }) : [];
      var badge = TYPE_BADGE[seg.type] || "";
      var cls = "seg";
      flags.forEach(function(f){ cls += " f-" + FLAG_DEF[f].cls; });
      if(flags.length){ cls += " flagged"; flaggedCount++; }
      var title = flags.length ? esc(flags.join("・") + (seg.note ? "：" + seg.note : "")) : "";
      markedHtml += '<span class="' + cls + '"' + (title ? ' title="' + title + '"' : '') + '>'
                  + (badge ? '<span class="badge">' + badge + '</span>' : '')
                  + esc(seg.text) + '</span>';

      if(flags.length){
        var tags = flags.map(function(f){
          return '<span class="f-tag t-' + FLAG_DEF[f].cls + '">' + esc(f) + '</span>';
        }).join("");
        var quote = seg.text.length > 60 ? seg.text.slice(0, 60) + "…" : seg.text;
        findingsHtml += '<div class="finding">' + tags
                      + '<span class="f-quote">「' + esc(quote) + '」</span>'
                      + (seg.note ? '<span class="f-note">' + esc(seg.note) + '</span>' : '')
                      + '</div>';
      }
    });

    if(!flaggedCount){
      findingsHtml = '<p class="none-note">検出フラグなし。区分の小字のみ確認のこと。</p>';
    }

    $("marked").innerHTML = markedHtml;
    $("findings").innerHTML = findingsHtml;
    $("summary").textContent = result.summary || "";
    $("remeasured").textContent = result.remeasured;
    $("result").classList.add("show");
  }

  /* ── 実行 ── */
  $("run").addEventListener("click", function(){
    var key   = $("apikey").value.trim();
    var model = $("model").value.trim() || "gemini-2.5-flash";
    var question = $("question").value.trim();
    var reply    = $("reply").value.trim();
    var status = $("status");

    status.classList.remove("error");
    if(!key){ status.textContent = "APIキーを設定してください。"; status.classList.add("error"); $("config").open = true; return; }
    if(!reply){ status.textContent = "AIの返答を貼ってください。"; status.classList.add("error"); return; }

    store("yomitoki_key", key);
    store("yomitoki_model", model);

    var btn = $("run");
    btn.disabled = true;
    status.textContent = "測り直しています…";
    $("result").classList.remove("show");
    $("copied").textContent = "";

    callGemini(key, model, buildPrompt(question, reply))
      .then(function(result){
        status.textContent = "";
        render(result);
      })
      .catch(function(err){
        status.textContent = err.message || "実行に失敗しました。";
        status.classList.add("error");
      })
      .then(function(){ btn.disabled = false; });
  });

  /* ── 写し ── */
  $("copy").addEventListener("click", function(){
    var text = $("remeasured").textContent;
    function done(){ $("copied").textContent = "写しました"; setTimeout(function(){ $("copied").textContent = ""; }, 2400); }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(done).catch(function(){ fallback(); });
    } else { fallback(); }
    function fallback(){
      var ta = document.createElement("textarea");
      ta.value = text; document.body.appendChild(ta); ta.select();
      try{ document.execCommand("copy"); done(); }catch(e){}
      document.body.removeChild(ta);
    }
  });

})();
</script>
</body>
