<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TAKIBI Lab</title>
<meta name="description" content="TAKIBI Lab のアプリ一覧。考えすぎた心をいったん休ませるためのセルフケアツールたち。">
<meta property="og:title" content="TAKIBI Lab">
<meta property="og:description" content="セルフケアツールの一覧ページです。">
<meta property="og:type" content="website">
<style>
:root {
  --bg: #1a1614;
  --surface: #2a2522;
  --surface-2: #353029;
  --border: #4a443d;
  --text: #f5f1ea;
  --text-muted: #c4bdb2;
  --text-dim: #948c80;
  --ember: #e86a3c;
  --ember-glow: #f5c4b3;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  padding: 3.5rem 1rem 4rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.container { max-width: 560px; width: 100%; }
header { text-align: center; margin-bottom: 2.5rem; }
.lab-label {
  font-size: 11px;
  letter-spacing: 0.25em;
  color: var(--ember);
  margin-bottom: 0.75rem;
}
header h1 {
  font-size: 28px;
  font-weight: 500;
  color: var(--ember-glow);
  letter-spacing: 0.05em;
  margin-bottom: 0.6rem;
}
header p {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.8;
}
.tools { display: flex; flex-direction: column; gap: 1rem; }
.tool-card {
  display: block;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem 1.75rem;
  text-decoration: none;
  color: inherit;
  transition: border-color 0.2s, background 0.2s, transform 0.2s;
}
.tool-card:hover {
  border-color: var(--ember);
  background: var(--surface-2);
  transform: translateY(-2px);
}
.tool-name {
  font-size: 18px;
  font-weight: 500;
  color: var(--ember-glow);
  margin-bottom: 0.4rem;
  letter-spacing: 0.04em;
}
.tool-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.75;
}
.section-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--ember);
  letter-spacing: 0.12em;
  margin: 2rem 0 0.9rem;
  padding-left: 0.2rem;
}
.section-title:first-of-type { margin-top: 0; }
footer {
  margin-top: 3rem;
  font-size: 12px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.8;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="lab-label">TAKIBI LAB</div>
    <h1>焚き火ラボ</h1>
    <p>考えすぎた心を、いったん休ませる場所。<br>用途に合わせてツールを選んでください。</p>
  </header>

  <div class="tools">
    <div class="section-title">セルフケアツール</div>

    <a class="tool-card" href="./takibi/">
      <div class="tool-name">焚き火</div>
      <div class="tool-desc">反芻思考のためのセルフケアツール。同じ考えが頭の中で回り続けるとき、書き出して少し整理し、いったん区切るための場所です。</div>
    </a>

    <a class="tool-card" href="./yomitoki/">
      <div class="tool-name">よみとき</div>
      <div class="tool-desc">AIの返答を、測り直す。AIの返答を8つの軸で検品し、測り直した文に組み直すツールです。</div>
    </a>

    <div class="section-title">景色シリーズ</div>

    <a class="tool-card" href="./keshiki/umi/">
      <div class="tool-name">海</div>
      <div class="tool-desc">揺れる海を、ただ眺める。視覚で楽しむ景色シリーズ。波の動きを見つめて、心をそっと休ませる時間を。</div>
    </a>
  </div>

  <footer>
    <p>本ツールは医療や治療を提供するものではありません。<br>強い不安が続く場合は、専門の相談窓口の利用もご検討ください。</p>
  </footer>
</div>
</body>
</html>
